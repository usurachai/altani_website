name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Bun
        run: npm install -g bun

      - name: Build Project
        run: bun run build

      - name: Pre-render HTML
        run: |
          node --input-type=module -e "
            import { writeFileSync } from 'fs';
            const m = await import('./dist/server/server.js');
            const server = m.default;
            const response = await server.fetch(new Request('http://localhost/'), {}, {});
            const html = await response.text();
            writeFileSync('dist/client/index.html', html);
            console.log('index.html created: ' + html.length + ' bytes');
          "

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/client --project-name=altani-website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 942842364f06ec3a739c5110ab0e8f59