name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Bun
        run: npm install -g bun

      - name: Build Project
        run: bun run build

      - name: Prepare Pages Output
        run: |
          mkdir -p dist/client/functions
          cp dist/server/server.js dist/client/functions/[[path]].js
          cp dist/server/server.js dist/client/server.js
          cp dist/server/assets/* dist/client/assets/

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/client --project-name=altani-website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 942842364f06ec3a739c5110ab0e8f59